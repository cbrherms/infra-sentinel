---
- name: Install cage Wayland compositor
  ansible.builtin.apt:
    name: cage
    state: present
    update_cache: true

- name: Install Chromium via snap
  community.general.snap:
    name: chromium
    state: present

- name: Create kiosk system user (no login shell, no password)
  ansible.builtin.user:
    name: "{{ kiosk_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: true
    home: "/home/{{ kiosk_user }}"
    groups:
      - video
      - render
    append: true
    state: present

- name: Deploy kiosk systemd service unit
  ansible.builtin.template:
    src: kiosk.service.j2
    dest: /etc/systemd/system/kiosk.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd daemon
    - Restart kiosk service

- name: Enable and start kiosk service
  ansible.builtin.systemd:
    name: kiosk.service
    enabled: true
    state: started
    daemon_reload: true
