---
- name: Deploy udev rule for NUT USB access
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/62-nut-usbups.rules
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible - do not edit manually.
      SUBSYSTEM=="usb", ATTR{idVendor}=="051d", GROUP="nut", MODE="0660"
  notify: Reload udev rules

- name: Deploy /etc/nut/nut.conf
  ansible.builtin.template:
    src: nut.conf.j2
    dest: /etc/nut/nut.conf
    owner: root
    group: nut
    mode: "0640"
  notify:
    - Restart nut-server
    - Restart nut-monitor

- name: Deploy /etc/nut/ups.conf
  ansible.builtin.template:
    src: ups.conf.j2
    dest: /etc/nut/ups.conf
    owner: root
    group: nut
    mode: "0640"
  notify:
    - Restart nut-driver
    - Restart nut-server

- name: Deploy /etc/nut/upsd.conf
  ansible.builtin.template:
    src: upsd.conf.j2
    dest: /etc/nut/upsd.conf
    owner: root
    group: nut
    mode: "0640"
  notify: Restart nut-server

- name: Deploy /etc/nut/upsd.users
  ansible.builtin.template:
    src: upsd.users.j2
    dest: /etc/nut/upsd.users
    owner: root
    group: nut
    mode: "0640"
  notify: Restart nut-server

- name: Deploy /etc/nut/upsmon.conf
  ansible.builtin.template:
    src: upsmon.conf.j2
    dest: /etc/nut/upsmon.conf
    owner: root
    group: nut
    mode: "0640"
  notify: Restart nut-monitor

- name: Enable and start nut-server service
  ansible.builtin.systemd:
    name: nut-server
    enabled: true
    state: started

- name: Enable and start nut-monitor service
  ansible.builtin.systemd:
    name: nut-monitor
    enabled: true
    state: started

- name: Enable and start nut-driver services
  ansible.builtin.systemd:
    name: "nut-driver@{{ item.name }}"
    enabled: true
    state: started
  loop: "{{ ups_devices }}"
  retries: 5
  delay: 5
  register: _nut_driver_start  # noqa: var-naming[no-role-prefix]
  until: _nut_driver_start is not failed
