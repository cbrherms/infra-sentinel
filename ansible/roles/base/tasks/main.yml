---
- name: Ensure ansible log directory exists
  ansible.builtin.file:
    path: /var/log/ansible
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: safe
    cache_valid_time: 3600

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - git
      - ansible
      - curl
      - vim
      - htop
      - unattended-upgrades
    state: present

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ server_hostname }}"

- name: Ensure hostname is present in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1  {{ server_hostname }}"
    state: present

- name: Create admin user
  ansible.builtin.user:
    name: "{{ admin_username }}"
    shell: /bin/bash
    groups: sudo
    append: true
    state: present
    create_home: true

- name: Add SSH public key to admin user
  ansible.posix.authorized_key:
    user: "{{ admin_username }}"
    key: "{{ admin_ssh_public_key }}"
    state: present
    exclusive: false

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication no"
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Disable SSH challenge-response authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ChallengeResponseAuthentication'
    line: "ChallengeResponseAuthentication no"
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Disable SSH root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin no"
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

- name: Deploy unattended-upgrades configuration
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  when: unattended_upgrades_enabled | bool
  notify: Restart unattended-upgrades

- name: Enable unattended-upgrades service
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started
  when: unattended_upgrades_enabled | bool

- name: Add NUT build prefix to system PATH
  ansible.builtin.copy:
    content: "PATH={{ nut_build_prefix }}/bin:{{ nut_build_prefix }}/sbin:$PATH\n"
    dest: /etc/profile.d/nut-path.sh
    owner: root
    group: root
    mode: "0644"

- name: Create /etc/ansible directory
  ansible.builtin.file:
    path: /etc/ansible
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy ansible-pull systemd service unit
  ansible.builtin.template:
    src: ansible-pull.service.j2
    dest: /etc/systemd/system/ansible-pull.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd daemon
    - Restart ansible-pull timer

- name: Deploy ansible-pull systemd timer unit
  ansible.builtin.template:
    src: ansible-pull.timer.j2
    dest: /etc/systemd/system/ansible-pull.timer
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd daemon
    - Restart ansible-pull timer

- name: Enable and start ansible-pull timer
  ansible.builtin.systemd:
    name: ansible-pull.timer
    enabled: true
    state: started
    daemon_reload: true
